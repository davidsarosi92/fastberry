name: Audit

# Dependency CVE scan. Scheduled (not a PR gate) so a freshly-published advisory
# in a dependency we don't control can't block unrelated PRs.
on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history/tags to compute the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: pip-audit
        run: |
          python -m pip install pip-audit
          pip-audit
