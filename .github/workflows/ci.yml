name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history/tags to compute the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy

      - name: pyright — public API type completeness
        run: |
          pip install pyright==1.1.409
          python - <<'PY'
          import json, subprocess, sys
          out = subprocess.run(
              ["pyright", "--verifytypes", "fastberry", "--ignoreexternal", "--outputjson"],
              capture_output=True, text=True,
          ).stdout
          score = json.loads(out)["typeCompleteness"]["completenessScore"]
          floor = 0.60  # ratchet: raise as the public API gets annotated
          print(f"public API type completeness: {score:.1%} (floor {floor:.0%})")
          sys.exit(0 if score >= floor else 1)
          PY

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history/tags to compute the version

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q --cov=fastberry --cov-report=term-missing

  isolation:
    # Guards the dependency decoupling: each optional extra must install only
    # its own stack (no Django/strawberry/orjson leaking across the boundary).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history/tags to compute the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nox
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Run isolation sessions
        run: nox -s isolation
