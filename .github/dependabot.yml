version: 2
updates:
  # Keep GitHub Actions pinned versions current (clear win, no CI cost).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Dev/tooling dependency bumps (pyproject extras). Low-noise weekly cadence.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
